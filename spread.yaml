project: hello-rust-zygoon

backends:
    garden:
        type: adhoc
        allocate: |
            if [ -n "${SPREAD_HOST_PATH-}" ]; then
                PATH="${SPREAD_HOST_PATH}"
            fi
            exec image-garden allocate --spread "$SPREAD_SYSTEM"."$(uname -m)"
        discard: |
            if [ -n "${SPREAD_HOST_PATH-}" ]; then
                PATH="${SPREAD_HOST_PATH}"
            fi
            image-garden discard "$SPREAD_SYSTEM_ADDRESS"
        systems:
            - ubuntu-cloud-24.04:
                  username: ubuntu
                  password: ubuntu
            - ubuntu-cloud-26.04:
                  username: ubuntu
                  password: ubuntu

exclude:
    - ".image-garden/*"
    - ".cache/snaps/*"

path: /root/hello-rust-zygoon

prepare: |
    # Install the openshell snap that was copied into the test environment.
    snap install ./hello-rust-zygoon_*.snap --dangerous

debug-each: |
    echo "Kernel and architecture:"
    uname -a

    echo "OS release info:"
    cat /etc/os-release

    echo "Installed snaps:"
    snap list

    set +e

    echo "Configuration of the openshell snap:"
    snap get openshell

suites:
    tests/smoke/:
        summary: Smoke tests for the snap

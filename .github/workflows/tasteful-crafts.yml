name: tasteful crafts

on:
  workflow_call:
    inputs:
      cache-host-snaps:
        type: boolean
        description: "Whether to cache host snaps (snapd, core22, core24) during installation"
        required: false
        default: true
      cache-pristine-images:
        type: boolean
        description: Use GitHub cache to store pristine images (recommended)
        required: false
        default: true
      cache-prepared-images:
        type: boolean
        description: Use GitHub cache to store project-specific images
        required: false
        default: false
      snapd-channel:
        type: string
        description: "Snap store channel for snapd snap (e.g., latest/stable, latest/edge)"
        required: false
        default: latest/stable
      core22-channel:
        type: string
        description: "Snap store channel for core22 snap (e.g., latest/stable, latest/edge)"
        required: false
        default: latest/stable
      core24-channel:
        type: string
        description: "Snap store channel for core24 snap (e.g., latest/stable, latest/edge)"
        required: false
        default: latest/stable
      lxd-channel:
        type: string
        description: "Snap store channel for LXD snap (e.g., latest/stable, latest/edge)"
        required: false
        default: latest/stable
      snapcraft-channel:
        type: string
        description: "Snap store channel for Snapcraft snap (e.g., latest/stable, latest/edge)"
        required: false
        default: latest/stable
      image-garden-channel:
        type: string
        description: "Snap store channel for image-garden snap (e.g., latest/stable, latest/edge)"
        required: false
        default: latest/stable
      image-garden-components:
        type: string
        description: "Comma-separated list of image-garden components to install"
        required: false
        default: ""
      spread-systems:
        type: string
        description: "Optional JSON array of spread systems to test; when empty, discover them from spread -list"
        required: false
        default: ""
      spread-tasks:
        type: string
        description: "The name of the spread tasks to run (e.g., tests/smoke)"
        required: false
        default: ""
      spread-variant:
        type: string
        description: "Variant of spread to use (empty string or plus)"
        required: false
        default: ""
      spread-live:
        type: boolean
        description: "Enable live mode for spread (only available when spread-variant is plus)"
        required: false
        default: false
      pack-runs-on-amd64:
        type: string
        description: Runner label for the amd64 snap build
        required: false
        default: ubuntu-24.04
      pack-runs-on-arm64:
        type: string
        description: Runner label for the arm64 snap build
        required: false
        default: ubuntu-24.04-arm
      spread-runs-on:
        type: string
        description: Runner label for amd64 spread jobs
        required: false
        default: ubuntu-24.04
      spread-runs-on-arm64:
        type: string
        description: Runner label for arm64 spread jobs
        required: false
        default: ubuntu-24.04-arm
      snapstore-channel:
        type: string
        description: "Snap store channel to publish to (e.g., latest/edge)"
        required: true
      github-environment:
        type: string
        description: "Deployment environment (defaults to latest/candidate for tags, latest/edge otherwise)"
        required: false
        default: ""
      github-deployment:
        type: boolean
        description: "Whether upload jobs should be marked as deployments"
        required: false
        default: true
    secrets:
      publish-credentials:
        description: "GitHub secret containing Snap Store credentials for publishing"
        required: true

jobs:
  discover-spread-systems:
    name: discover spread systems
    runs-on: ${{ inputs.spread-runs-on }}
    outputs:
      spread-systems: ${{ steps.discover.outputs.spread-systems }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install snapd snap
        uses: ./.github/actions/install-cached-snap
        with:
          snap-name: snapd
          channel: ${{ inputs.snapd-channel }}
          enable-cache: ${{ inputs.cache-host-snaps }}

      - name: Install core24 snap
        uses: ./.github/actions/install-cached-snap
        with:
          snap-name: core24
          channel: ${{ inputs.core24-channel }}
          enable-cache: ${{ inputs.cache-host-snaps }}

      - name: Install image-garden snap
        uses: ./.github/actions/install-cached-snap
        with:
          snap-name: image-garden
          channel: ${{ inputs.image-garden-channel }}
          components: ${{ inputs.image-garden-components }}
          enable-cache: ${{ inputs.cache-host-snaps }}

      - name: Use spread from image-garden snap
        run: sudo snap alias image-garden.spread spread

      - name: Discover spread systems
        id: discover
        shell: bash
        env:
          INPUT_SPREAD_SYSTEMS: ${{ inputs.spread-systems }}
        run: |
          set -euo pipefail
          if [ -n "$INPUT_SPREAD_SYSTEMS" ]; then
            spread_systems="$INPUT_SPREAD_SYSTEMS"
          else
            spread_systems="$(
              spread -list | cut -d : -f 2 | sort -u |
                python3 -c 'import json, sys; print(json.dumps([line.strip() for line in sys.stdin if line.strip()]))'
            )"
          fi

          if [ "$spread_systems" = "[]" ]; then
            echo "::error::No spread systems discovered"
            exit 1
          fi

          echo "spread-systems=$spread_systems" >> "$GITHUB_OUTPUT"
          echo "Spread systems: $spread_systems"

  snapcraft-pack-amd64:
    name: snapcraft (amd64)
    uses: ./.github/workflows/snapcraft-pack.yml
    with:
      job-arch: amd64
      cache-host-snaps: ${{ inputs.cache-host-snaps }}
      snapd-channel: ${{ inputs.snapd-channel }}
      core22-channel: ${{ inputs.core22-channel }}
      core24-channel: ${{ inputs.core24-channel }}
      lxd-channel: ${{ inputs.lxd-channel }}
      snapcraft-channel: ${{ inputs.snapcraft-channel }}
      runs-on: ${{ inputs.pack-runs-on-amd64 }}

  snapcraft-pack-arm64:
    name: snapcraft (arm64)
    uses: ./.github/workflows/snapcraft-pack.yml
    with:
      job-arch: arm64
      cache-host-snaps: ${{ inputs.cache-host-snaps }}
      snapd-channel: ${{ inputs.snapd-channel }}
      core22-channel: ${{ inputs.core22-channel }}
      core24-channel: ${{ inputs.core24-channel }}
      lxd-channel: ${{ inputs.lxd-channel }}
      snapcraft-channel: ${{ inputs.snapcraft-channel }}
      runs-on: ${{ inputs.pack-runs-on-arm64 }}

  spread-amd64:
    name: spread (amd64) - ${{ matrix.spread-system }}
    needs: [discover-spread-systems, snapcraft-pack-amd64]
    strategy:
      matrix:
        spread-system: ${{ fromJSON(needs.discover-spread-systems.outputs.spread-systems) }}
    uses: ./.github/workflows/spread.yml
    with:
      job-arch: amd64
      cache-host-snaps: ${{ inputs.cache-host-snaps }}
      cache-pristine-images: ${{ inputs.cache-pristine-images }}
      cache-prepared-images: ${{ inputs.cache-prepared-images }}
      snapd-channel: ${{ inputs.snapd-channel }}
      core24-channel: ${{ inputs.core24-channel }}
      image-garden-channel: ${{ inputs.image-garden-channel }}
      image-garden-components: ${{ inputs.image-garden-components }}
      runs-on: ${{ inputs.spread-runs-on }}
      spread-system: ${{ matrix.spread-system }}
      spread-arch: x86_64
      spread-tasks: ${{ inputs.spread-tasks }}
      spread-variant: ${{ inputs.spread-variant }}
      spread-live: ${{ inputs.spread-live }}
      snap-artifact-name: snap-${{ needs.snapcraft-pack-amd64.outputs.arch }}
      snap-filename: ${{ needs.snapcraft-pack-amd64.outputs.snap-filename }}

  # Create GitHub environments that match the deployment target names used
  # here (latest/edge for branch builds, latest/candidate for tag builds by
  # default), then add an environment secret named
  # SNAPCRAFT_STORE_CREDENTIALS. Export the secret value locally with:
  # snapcraft export-login --snaps=<snap-name> --channels=<publish-channel> \
  #   --acls=package_upload,package_release <token-name>
  snapcraft-upload:
    name: snapcraft upload
    # Upload built snaps only after smoke testing the amd64 build first.
    needs: [snapcraft-pack-amd64, snapcraft-pack-arm64, spread-amd64]
    uses: ./.github/workflows/snapcraft-upload.yml
    with:
      artifact-pattern: snap-*
      cache-host-snaps: ${{ inputs.cache-host-snaps }}
      snapd-channel: ${{ inputs.snapd-channel }}
      core24-channel: ${{ inputs.core24-channel }}
      snapcraft-channel: ${{ inputs.snapcraft-channel }}
      snapstore-channel: ${{ inputs.snapstore-channel }}
      github-environment: ${{ inputs.github-environment || (github.ref_type == 'tag' && 'latest/candidate' || 'latest/edge') }}
      github-deployment: ${{ inputs.github-deployment }}
    secrets:
      publish-credentials: ${{ secrets.publish-credentials }}
